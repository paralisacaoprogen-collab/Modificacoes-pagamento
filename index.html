<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFC Arena - Gestão Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; color: white; 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.96)), url('XFC.jpeg');
            background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh;
        }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(251, 191, 36, 0.15); }
        .pos-GOL { background: #ef4444; } .pos-ZAG { background: #3b82f6; }
        .pos-MEI { background: #fbbf24; color: black; } .pos-ATA { background: #f97316; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="xfcApp()" x-init="init()">

    <header class="bg-yellow-500 p-4 sticky top-0 z-50 shadow-2xl flex justify-between items-center text-black">
        <h1 class="font-black italic text-xl uppercase tracking-tighter">XFC ARENA</h1>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black bg-black/10 px-2 py-1 rounded" x-text="listaSorteio.length + ' NO JOGO'"></span>
            <button @click="resetarCiclo()" class="text-[10px] bg-black text-white px-3 py-1 rounded font-bold uppercase">Zerar Ciclo</button>
        </div>
    </header>

    <div class="fixed right-4 top-1/2 -translate-y-1/2 z-[100] flex flex-col gap-4">
        <button @click="abrirPagamentoMensal('mensalista')" class="w-12 h-12 bg-yellow-500 rounded-xl flex items-center justify-center border-2 border-black shadow-xl hover:scale-110 transition-transform">
            <span class="text-black font-black">M</span>
        </button>
        <button @click="abrirPagamentoMensal('mantenedor')" class="w-12 h-12 bg-cyan-500 rounded-xl flex items-center justify-center border-2 border-black shadow-xl hover:scale-110 transition-transform">
            <span class="text-black font-black text-xl">🛡️</span>
        </button>
    </div>

    <main class="max-w-4xl mx-auto p-4 py-8 space-y-8">
        <div x-show="etapa === 'lista'" class="space-y-6">
            <button @click="abrirInscricaoJogo()" class="w-full bg-yellow-500 text-black py-6 rounded-3xl font-black text-2xl shadow-xl uppercase">⚽ ENTRAR NA LISTA</button>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <template x-for="j in listaSorteio" :key="j.id">
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-yellow-500">
                        <div class="flex items-center gap-4">
                            <div :class="'pos-' + j.posicao" class="w-10 h-10 rounded-xl flex items-center justify-center font-black text-[10px]" x-text="j.posicao"></div>
                            <div>
                                <div class="font-black uppercase text-yellow-500 text-sm" x-text="j.nome"></div>
                                <div class="text-[9px] text-slate-400 font-bold uppercase" x-text="j.tipo"></div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <button x-show="listaSorteio.length >= 4" @click="confirmarSorteio()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xl uppercase shadow-xl">Sortear Times ⚡</button>
        </div>

        <div x-show="etapa === 'resultado'" x-cloak class="space-y-6">
            <div class="text-center"><h2 class="font-black text-yellow-500 text-3xl uppercase italic">Times Definidos</h2></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="(time, i) in timesGerados">
                    <div class="glass rounded-3xl overflow-hidden border border-yellow-500/20 shadow-2xl">
                        <div :class="i === 0 ? 'bg-yellow-500 text-black' : 'bg-zinc-900 text-yellow-500 border-b border-yellow-500/30'" 
                             class="p-3 font-black text-center uppercase tracking-widest" 
                             x-text="i === 0 ? 'TIME AMARELO' : 'TIME PRETO'"></div>
                        
                        <div class="p-4 space-y-2">
                            <template x-for="p in time">
                                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center">
                                    <span class="font-bold uppercase text-sm" x-text="p.nome"></span>
                                    <span class="text-[9px] text-yellow-500 font-black" x-text="p.posicao"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="etapa = 'lista'" class="w-full bg-zinc-800 py-3 rounded-xl text-yellow-500 text-[10px] font-black uppercase mt-4">Voltar para Lista</button>
        </div>
    </main>

    <div x-show="showPix" class="fixed inset-0 bg-black/98 z-[300] flex items-center justify-center p-4" x-cloak>
        <div class="glass p-8 rounded-[40px] w-full max-w-sm text-center space-y-6">
            <div x-show="!pixGerado">
                <h3 class="font-black text-yellow-500 uppercase italic" x-text="form.tipo"></h3>
                <p class="text-white text-3xl font-black mt-2" x-text="getValor()"></p>
                <button @click="pixGerado = true" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase mt-4">Gerar QR Code</button>
            </div>
            <div x-show="pixGerado" class="space-y-6">
                <div class="bg-white p-2 inline-block rounded-2xl mx-auto border-4 border-yellow-500 shadow-2xl">
                    <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(getPixString())">
                </div>
                <button @click="copyPix()" class="w-full bg-zinc-800 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 border border-white/10">
                    <span>📋</span> COPIAR CÓDIGO PIX
                </button>
                <button @click="finalizarInscricao()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase shadow-lg">Já paguei!</button>
            </div>
            <button @click="showPix = false; pixGerado = false" class="text-slate-600 text-[10px] font-black uppercase">Voltar</button>
        </div>
    </div>

    <div x-show="showModalCad" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4" x-cloak>
        <div class="glass p-8 rounded-[40px] w-full max-w-sm space-y-6 border-yellow-500">
            <h3 class="text-center font-black text-yellow-500 uppercase italic">Inscrição Jogo</h3>
            <input x-model="form.nome" type="text" placeholder="SEU NOME" class="w-full bg-black p-5 rounded-2xl border border-white/10 text-white uppercase font-black outline-none">
            <div class="grid grid-cols-2 gap-3">
                <select x-model="form.posicao" class="bg-black p-4 rounded-xl text-white text-[11px] font-bold border border-white/10 uppercase">
                    <option value="GOL">Goleiro</option><option value="ZAG">Zagueiro</option><option value="MEI">Meio-Campo</option><option value="ATA">Atacante</option>
                </select>
                <select x-model="form.tipo" class="bg-black p-4 rounded-xl text-white text-[11px] font-bold border border-white/10 uppercase">
                    <option value="visitante">Visitante</option><option value="mensalista">Mensalista</option><option value="mantenedor">Mantenedor</option>
                </select>
            </div>
            <button @click="processarInscricaoJogo()" class="w-full bg-yellow-500 text-black py-5 rounded-2xl font-black uppercase">Confirmar</button>
            <button @click="showModalCad = false" class="w-full text-slate-500 text-[10px] font-black uppercase">Cancelar</button>
        </div>
    </div>

    <div x-show="showModalNomeFin" class="fixed inset-0 bg-black/95 z-[250] flex items-center justify-center p-4" x-cloak>
        <div class="glass p-8 rounded-[40px] w-full max-w-sm space-y-6 border-cyan-500">
            <h3 class="text-center font-black text-cyan-500 uppercase italic">Identificação</h3>
            <input x-model="form.nome" type="text" placeholder="NOME COMPLETO" class="w-full bg-black p-5 rounded-2xl border border-white/10 text-white uppercase font-black outline-none">
            <button @click="confirmarNomeFinanceiro()" class="w-full bg-cyan-500 text-black py-5 rounded-2xl font-black uppercase">Continuar para Pix</button>
            <button @click="showModalNomeFin = false" class="w-full text-slate-500 text-[10px] font-black uppercase text-center w-full">Cancelar</button>
        </div>
    </div>

    <script>
        const API = "https://api.npoint.io/af23b1be1b7083d862a9";
        function xfcApp() {
            return {
                etapa: 'lista', showModalCad: false, showModalNomeFin: false, showPix: false, pixGerado: false, logado: false, fluxoSorteio: true,
                senha: '', listaSorteio: [], listaFinanceiroMensal: [], timesGerados: [],
                form: { nome: '', posicao: 'MEI', tipo: 'visitante' },

                async init() { await this.sync(); setInterval(() => this.sync(), 5000); },
                async sync() {
                    try {
                        const r = await fetch(`${API}?t=${Date.now()}`);
                        const d = await r.json();
                        this.listaSorteio = d.sorteio || [];
                        this.listaFinanceiroMensal = d.financeiro_mensal || [];
                        this.timesGerados = d.times_gerados || [];
                        this.etapa = this.timesGerados.length > 0 ? 'resultado' : 'lista';
                    } catch(e) { console.log("Erro ao sincronizar") }
                },
                async save(s, fm, tg) {
                    try {
                        await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ sorteio: s, financeiro_mensal: fm, times_gerados: tg }) });
                        await this.sync();
                    } catch(e) { alert("Erro ao salvar!"); }
                },
                abrirInscricaoJogo() { this.form = { nome: '', posicao: 'MEI', tipo: 'visitante' }; this.fluxoSorteio = true; this.showModalCad = true; },
                abrirPagamentoMensal(tipo) { this.form = { nome: '', posicao: 'MEI', tipo: tipo }; this.fluxoSorteio = false; this.showModalNomeFin = true; },
                confirmarNomeFinanceiro() { if(!this.form.nome.trim()) return alert("Informe!"); this.showModalNomeFin = false; this.showPix = true; },
                processarInscricaoJogo() { if(!this.form.nome.trim()) return alert("Nome!"); if(this.form.tipo === 'visitante') { this.showModalCad = false; this.showPix = true; } else { this.finalizarInscricao(); } },
                async finalizarInscricao() {
                    const n = this.form.nome.trim().toUpperCase();
                    const reg = { id: Date.now(), nome: n, tipo: this.form.tipo, posicao: this.form.posicao };
                    await this.sync();
                    let ns = [...this.listaSorteio], nf = [...this.listaFinanceiroMensal];
                    if(this.fluxoSorteio) { if(!ns.some(x => x.nome === n)) ns.push(reg); } 
                    else { if(!nf.some(x => x.nome === n)) nf.push(reg); }
                    await this.save(ns, nf, this.timesGerados);
                    this.showModalCad = this.showPix = this.pixGerado = this.showModalNomeFin = false;
                    confetti({ particleCount: 100, origin: { y: 0.8 } });
                },
                copyPix() { navigator.clipboard.writeText(this.getPixString()).then(() => alert("✅ Código Pix copiado!")); },
                getPixString() {
                    const c = {
                        visitante: "00020101021126360014br.gov.bcb.pix011442180353000160520400005303986540515.005802BR5920ALMEIDA REPRESENTACO6009SAO PAULO62070503***630428BB",
                        mensalista: "00020101021126360014br.gov.bcb.pix011442180353000160520400005303986540570.005802BR5920ALMEIDA REPRESENTACO6009SAO PAULO62070503***6304C43E",
                        mantenedor: "00020101021126360014br.gov.bcb.pix0114421803530001605204000053039865406100.005802BR5920ALMEIDA REPRESENTACO6009SAO PAULO62070503***63041FFD"
                    };
                    return c[this.form.tipo];
                },
                getValor() { return this.form.tipo === 'visitante' ? 'R$ 15,00' : this.form.tipo === 'mensalista' ? 'R$ 70,00' : 'R$ 100,00'; },
                fazerLogin() { if(this.senha === 'Diretoria') this.logado = true; else alert("Erro!"); },
                async resetarCiclo() { if(confirm("Zerar?")) await this.save([], this.listaFinanceiroMensal, []); },
                async confirmarSorteio() {
                    if(this.listaSorteio.length < 4) return alert("Mínimo 4!");
                    const t1 = [], t2 = [];
                    [...this.listaSorteio].sort(() => Math.random() - 0.5).forEach((j, i) => i % 2 === 0 ? t1.push(j) : t2.push(j));
                    await this.save(this.listaSorteio, this.listaFinanceiroMensal, [t1, t2]);
                    confetti({ particleCount: 150 });
                }
            }
        }
    </script>
</body>
</html>
